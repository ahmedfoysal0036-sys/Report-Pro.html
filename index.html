<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHMED_V5 | OnePage Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');
        body { font-family: 'Roboto', sans-serif; background: #f0f2f5; margin: 0; padding: 0; }
        @page { size: landscape; margin: 5mm; }
        @media print {
            .no-print { display: none !important; }
            body { background: white; }
            .report-paper { width: 100% !important; margin: 0 !important; padding: 5mm !important; border: none !important; box-shadow: none !important; }
            th, td { border: 1.2px solid black !important; font-size: 9px !important; padding: 2px !important; }
            .input-box { font-size: 9px !important; }
        }
        .report-paper { width: 285mm; min-height: 195mm; background: white; margin: 10px auto; padding: 10mm; box-shadow: 0 0 10px rgba(0,0,0,0.1); position: relative; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th, td { border: 1px solid black; text-align: center; }
        .input-box { width: 100%; border: none; outline: none; background: transparent; text-align: center; font-size: 10px; }
        .editable-head { font-weight: bold; width: 100%; text-align: center; background: transparent; border: none; font-size: 8.5px; text-transform: uppercase; }
        .sig-box { border-top: 1px solid black; width: 150px; text-align: center; font-size: 10px; font-weight: bold; margin-top: 30px; }
    </style>
</head>
<body>

    <nav class="bg-slate-900 text-white p-3 sticky top-0 z-50 no-print flex justify-between items-center shadow-md">
        <h1 class="font-bold text-sm tracking-tight text-blue-400">AHMED_V5.0 | PRINT OPTIMIZED</h1>
        <div class="flex gap-2">
            <button onclick="switchTab('entry')" class="bg-slate-700 px-3 py-1 rounded text-xs font-bold">Entry Form</button>
            <button onclick="switchTab('history')" class="bg-slate-700 px-3 py-1 rounded text-xs font-bold">History</button>
        </div>
    </nav>

    <div id="entrySection">
        <div class="report-paper">
            <div class="flex justify-between items-start mb-2">
                <div class="w-1/3 space-y-0.5">
                    <p class="text-[9px] font-bold">ASSIGNED BY: <input type="text" id="assignedBy" class="border-b border-black w-32 outline-none px-1" value="MD AZMIR HOSSAIN"></p>
                    <p class="text-[9px] font-bold">NAME: <input type="text" id="userName" class="border-b border-black w-40 outline-none px-1" value="SM FAISAL AHMED"></p>
                    <p class="text-[9px] font-bold">DESIGNATION: <input type="text" id="userDesig" class="border-b border-black w-32 outline-none px-1" value="SENIOR SUPERVISOR"></p>
                </div>
                <div class="text-center">
                    <h1 class="font-bold text-xl uppercase leading-none">Dhanmondi SC</h1>
                    <p class="text-[8px] font-bold uppercase tracking-widest mt-1">Daily Activity Report</p>
                </div>
                <div class="w-1/3 text-right space-y-1">
                    <p class="text-[9px] font-bold">REPORT DATE: <input type="date" id="reportDate" class="border rounded px-1 font-bold text-[9px]"></p>
                    <div class="text-[9px] font-bold flex justify-end gap-2">
                        <label><input type="checkbox" id="shiftDay" checked> DAY</label>
                        <label><input type="checkbox" id="shiftNight"> NIGHT</label>
                    </div>
                </div>
            </div>

            <table id="mainTable">
                <thead class="bg-slate-50">
                    <tr>
                        <th class="w-[3%]">SL</th>
                        <th class="w-[9%]">Client</th>
                        <th class="w-[10%]">Site Code</th>
                        <th class="w-[35%]">Work Details</th>
                        <th class="w-[7%]"><input type="text" class="editable-head" value="Operation"></th>
                        <th class="w-[7%]"><input type="text" class="editable-head" value="Implementation"></th>
                        <th class="w-[7%]"><input type="text" class="editable-head" value="PM"></th>
                        <th class="w-[7%]"><input type="text" class="editable-head" value="Others"></th>
                        <th class="w-[15%]">Remarks</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>

            <div class="flex justify-between mt-4 px-4">
                <div class="sig-box">SUBMITTED BY</div>
                <div class="sig-box">CHECKED BY</div>
                <div class="sig-box">RECEIVED BY</div>
            </div>

            <div class="mt-6 flex gap-4 no-print justify-center border-t pt-4">
                <button onclick="saveAndPushTelegram()" class="bg-emerald-600 text-white px-5 py-2 rounded-lg font-bold text-xs shadow-md">SYNC TELEGRAM</button>
                <button onclick="exportToExcel()" class="bg-blue-600 text-white px-5 py-2 rounded-lg font-bold text-xs shadow-md">EXCEL DOWNLOAD</button>
                <button onclick="window.print()" class="bg-slate-800 text-white px-5 py-2 rounded-lg font-bold text-xs shadow-md">PRINT (A4 LANDSCAPE)</button>
            </div>
        </div>
    </div>

    <div id="historySection" class="hidden p-6 max-w-4xl mx-auto">
        <div class="bg-white p-4 rounded-xl shadow border">
            <h2 class="font-bold text-lg mb-4">Stored Logs</h2>
            <div id="historyList" class="space-y-2"></div>
        </div>
    </div>

    <script>
        const botToken = "8582534427:AAHq4TfwFqBIy1wU9mp6bDNQGSeSD49yX94";
        const chatId = "682844989";
        document.getElementById('reportDate').value = new Date().toISOString().split('T')[0];

        function initRows() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            // Reduced to 15 rows to fit precisely on one landscape page
            for(let i=1; i<=15; i++) {
                tbody.innerHTML += `
                    <tr>
                        <td class="h-7">${i}</td>
                        <td><input type="text" class="input-box client"></td>
                        <td><input type="text" class="input-box site font-bold text-blue-800"></td>
                        <td><input type="text" class="input-box text-left px-1 work-desc"></td>
                        <td><input type="checkbox" class="scale-100"></td>
                        <td><input type="checkbox" class="scale-100"></td>
                        <td><input type="checkbox" class="scale-100"></td>
                        <td><input type="checkbox" class="scale-100"></td>
                        <td><input type="text" class="input-box remarks text-left px-1"></td>
                    </tr>
                `;
            }
        }
        initRows();

        function switchTab(tab) {
            document.getElementById('entrySection').style.display = tab === 'entry' ? 'block' : 'none';
            document.getElementById('historySection').style.display = tab === 'history' ? 'block' : 'none';
            if(tab === 'history') renderHistory();
        }

        async function saveAndPushTelegram() {
            const date = document.getElementById('reportDate').value;
            const rows = document.querySelectorAll('#tableBody tr');
            let dataEntries = [];
            let telegramText = `📊 *NEW REPORT:* ${date}\n👤 *User:* SM FAISAL AHMED\n───────────────────\n`;

            rows.forEach(row => {
                const site = row.querySelector('.site').value;
                if(site) {
                    const desc = row.querySelector('.work-desc').value;
                    telegramText += `📍 Site: ${site}\n📝 Work: ${desc}\n\n`;
                    dataEntries.push({ site, client: row.querySelector('.client').value, desc });
                }
            });

            if(dataEntries.length === 0) return alert("No data!");

            let history = JSON.parse(localStorage.getItem('prof_v5_logs')) || [];
            history.push({ id: Date.now(), date, entries: dataEntries });
            localStorage.setItem('prof_v5_logs', JSON.stringify(history));

            try {
                await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: chatId, text: telegramText, parse_mode: 'Markdown' })
                });
                alert("SUCCESS: Data sent to Telegram!");
            } catch (e) { alert("ERROR: Check connection."); }
        }

        function exportToExcel() {
            const table = document.getElementById("mainTable");
            const wb = XLSX.utils.table_to_book(table);
            XLSX.writeFile(wb, `Report_${document.getElementById('reportDate').value}.xlsx`);
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            let history = JSON.parse(localStorage.getItem('prof_v5_logs')) || [];
            list.innerHTML = history.reverse().map(h => `
                <div class="flex justify-between p-2 border rounded bg-slate-50 text-xs">
                    <span>📅 ${h.date} | Sites: ${h.entries.length}</span>
                    <button onclick="alert('Reloading is available.')" class="text-blue-600 font-bold uppercase">View</button>
                </div>
            `).join('') || '<p class="text-slate-400">No logs.</p>';
        }
    </script>
</body>
</html>
