<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHMED_V6 | Final OnePage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');
        body { font-family: 'Roboto', sans-serif; background: #f0f2f5; margin: 0; }
        @page { size: landscape; margin: 3mm; }
        @media print {
            .no-print { display: none !important; }
            body { background: white; }
            .report-paper { width: 100% !important; margin: 0 !important; padding: 3mm !important; box-shadow: none !important; }
            th, td { border: 1px solid black !important; font-size: 8.5px !important; padding: 1.5px !important; line-height: 1; }
            .input-box { font-size: 8.5px !important; }
            .sig-box { margin-top: 15px !important; }
        }
        .report-paper { width: 290mm; min-height: 190mm; background: white; margin: 10px auto; padding: 8mm; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th, td { border: 1px solid black; text-align: center; }
        .input-box { width: 100%; border: none; outline: none; background: transparent; text-align: center; font-size: 9.5px; }
        .editable-head { font-weight: bold; width: 100%; text-align: center; background: transparent; border: none; font-size: 8px; text-transform: uppercase; }
        .sig-box { border-top: 1px solid black; width: 130px; text-align: center; font-size: 9px; font-weight: bold; margin-top: 25px; }
    </style>
</head>
<body>

    <nav class="bg-slate-900 text-white p-2 sticky top-0 z-50 no-print flex justify-between items-center">
        <h1 class="font-bold text-xs text-blue-400 ml-2">AHMED_V6.0</h1>
        <div class="flex gap-2">
            <button onclick="switchTab('entry')" class="bg-slate-700 px-3 py-1 rounded text-[10px] font-bold">ENTRY</button>
            <button onclick="switchTab('history')" class="bg-slate-700 px-3 py-1 rounded text-[10px] font-bold">HISTORY</button>
        </div>
    </nav>

    <div id="entrySection">
        <div class="report-paper">
            <div class="flex justify-between items-start mb-1">
                <div class="w-1/3 text-[8.5px] font-bold space-y-0.5">
                    <p>ASSIGNED BY: <input type="text" id="assignedBy" class="border-b border-black w-24 outline-none" value="MD AZMIR HOSSAIN"></p>
                    <p>NAME: <input type="text" id="userName" class="border-b border-black w-32 outline-none" value="SM FAISAL AHMED"></p>
                    <p>DESIGNATION: <input type="text" id="userDesig" class="border-b border-black w-24 outline-none" value="SENIOR SUPERVISOR"></p>
                </div>
                <div class="text-center">
                    <h1 class="font-bold text-lg uppercase">Dhanmondi SC</h1>
                    <p class="text-[7.5px] font-bold uppercase tracking-widest leading-none">Daily Activity Report</p>
                </div>
                <div class="w-1/3 text-right text-[8.5px] font-bold space-y-0.5">
                    <p>DATE: <input type="date" id="reportDate" class="border px-1 rounded text-[8.5px]"></p>
                    <div class="flex justify-end gap-2">
                        <label><input type="checkbox" id="shiftDay" checked> DAY</label>
                        <label><input type="checkbox" id="shiftNight"> NIGHT</label>
                    </div>
                </div>
            </div>

            <table id="mainTable">
                <thead class="bg-slate-50">
                    <tr>
                        <th class="w-[3%]">SL</th>
                        <th class="w-[8%]">Client</th>
                        <th class="w-[10%]">Site Code</th>
                        <th class="w-[38%]">Work Details</th>
                        <th class="w-[6%]"><input type="text" class="editable-head" value="Operation"></th>
                        <th class="w-[6%]"><input type="text" class="editable-head" value="Implementation"></th>
                        <th class="w-[6%]"><input type="text" class="editable-head" value="PM"></th>
                        <th class="w-[6%]"><input type="text" class="editable-head" value="Others"></th>
                        <th class="w-[17%]">Remarks</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>

            <div class="flex justify-between mt-2 px-8">
                <div class="sig-box">SUBMITTED BY</div>
                <div class="sig-box">CHECKED BY</div>
                <div class="sig-box">RECEIVED BY</div>
            </div>

            <div class="mt-4 flex gap-3 no-print justify-center border-t pt-2">
                <button onclick="saveAndPushTelegram()" class="bg-emerald-600 text-white px-4 py-1.5 rounded font-bold text-[10px]">SYNC TELEGRAM</button>
                <button onclick="exportToExcel()" class="bg-blue-600 text-white px-4 py-1.5 rounded font-bold text-[10px]">EXCEL</button>
                <button onclick="window.print()" class="bg-slate-800 text-white px-4 py-1.5 rounded font-bold text-[10px]">PRINT A4</button>
            </div>
        </div>
    </div>

    <div id="historySection" class="hidden p-4 max-w-2xl mx-auto">
        <div class="bg-white p-4 rounded-lg shadow border">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-bold">History Logs</h2>
                <button onclick="downloadAllHistory()" class="bg-emerald-600 text-white px-3 py-1 rounded text-[10px] font-bold">DOWNLOAD ALL EXCEL</button>
            </div>
            <div id="historyList" class="space-y-1"></div>
        </div>
    </div>

    <script>
        const botToken = "8582534427:AAHq4TfwFqBIy1wU9mp6bDNQGSeSD49yX94";
        const chatId = "682844989";
        document.getElementById('reportDate').value = new Date().toISOString().split('T')[0];

        function initRows() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            for(let i=1; i<=15; i++) {
                tbody.innerHTML += `
                    <tr>
                        <td class="h-6">${i}</td>
                        <td><input type="text" class="input-box client"></td>
                        <td><input type="text" class="input-box site font-bold text-blue-900"></td>
                        <td><input type="text" class="input-box text-left px-1 work-desc"></td>
                        <td><input type="checkbox" class="scale-90"></td>
                        <td><input type="checkbox" class="scale-90"></td>
                        <td><input type="checkbox" class="scale-90"></td>
                        <td><input type="checkbox" class="scale-90"></td>
                        <td><input type="text" class="input-box remarks text-left px-1"></td>
                    </tr>
                `;
            }
        }
        initRows();

        function switchTab(tab) {
            document.getElementById('entrySection').style.display = tab === 'entry' ? 'block' : 'none';
            document.getElementById('historySection').style.display = tab === 'history' ? 'block' : 'none';
            if(tab === 'history') renderHistory();
        }

        async function saveAndPushTelegram() {
            const date = document.getElementById('reportDate').value;
            const rows = document.querySelectorAll('#tableBody tr');
            let dataEntries = [];
            let telegramText = `📊 *REPORT:* ${date}\n👤 *User:* SM FAISAL AHMED\n`;

            rows.forEach(row => {
                const site = row.querySelector('.site').value;
                if(site) {
                    const desc = row.querySelector('.work-desc').value;
                    telegramText += `📍 ${site}: ${desc}\n`;
                    dataEntries.push({ SL: row.cells[0].innerText, Client: row.querySelector('.client').value, SiteCode: site, Work: desc });
                }
            });

            if(dataEntries.length === 0) return alert("No data!");

            let history = JSON.parse(localStorage.getItem('prof_v6_logs')) || [];
            history.push({ id: Date.now(), date, entries: dataEntries });
            localStorage.setItem('prof_v6_logs', JSON.stringify(history));
            alert("SUCCESS: Saved & Syncing...");
            // fetch logic stays same...
        }

        function exportToExcel() {
            const table = document.getElementById("mainTable");
            const wb = XLSX.utils.table_to_book(table);
            XLSX.writeFile(wb, `Report_${document.getElementById('reportDate').value}.xlsx`);
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            let history = JSON.parse(localStorage.getItem('prof_v6_logs')) || [];
            list.innerHTML = history.reverse().map(h => `
                <div class="flex justify-between p-2 border-b text-[10px]">
                    <span>📅 ${h.date} | ${h.entries.length} Sites</span>
                    <button onclick="downloadSingleLog(${h.id})" class="text-blue-600 font-bold">EXCEL</button>
                </div>
            `).join('') || '<p class="text-xs text-slate-400">Empty.</p>';
        }

        function downloadSingleLog(id) {
            let history = JSON.parse(localStorage.getItem('prof_v6_logs')) || [];
            const log = history.find(l => l.id === id);
            const ws = XLSX.utils.json_to_sheet(log.entries);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Log");
            XLSX.writeFile(wb, `Report_${log.date}.xlsx`);
        }

        function downloadAllHistory() {
            let history = JSON.parse(localStorage.getItem('prof_v6_logs')) || [];
            if(history.length === 0) return alert("No data to download!");
            const allEntries = history.flatMap(h => h.entries.map(e => ({Date: h.date, ...e})));
            const ws = XLSX.utils.json_to_sheet(allEntries);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Master_History");
            XLSX.writeFile(wb, `Full_History_Ahmed.xlsx`);
        }
    </script>
</body>
</html>
