<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHMED_V26_FINAL | Professor Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        .report-paper { 
            width: 297mm; min-height: 210mm; padding: 12mm; background: white; 
            margin: auto; color: black; position: relative;
        }
        
        table { width: 100%; border-collapse: collapse; border: 2px solid black; table-layout: fixed; }
        th, td { border: 1.5px solid black; padding: 0; text-align: center; font-size: 11px; height: 32px; vertical-align: middle; }
        
        .header-input { border: none; outline: none; font-weight: bold; font-size: 12px; background: transparent; }
        .table-input { border: none; outline: none; width: 100%; text-align: center; font-size: 11px; background: transparent; height: 100%; padding: 0 5px; }
        
        .sc-title {
            font-size: 42px; 
            font-weight: 400;
            margin: 0;
            color: black;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* প্রিন্ট ফিক্স */
        @media print { 
            .no-print { display: none !important; }
            body { background: white !important; padding: 0 !important; margin: 0 !important; }
            /* প্রিন্টের সময় মেইন কন্টেন্ট হাইড করে শুধু প্রিন্ট কন্টেইনার দেখাবে */
            body > *:not(#printContainer) { display: none !important; }
            #printContainer { display: block !important; width: 100% !important; }
            .print-page-break { page-break-after: always; display: block !important; }
            @page { size: landscape; margin: 0; }
        }

        #printContainer { display: none; }
    </style>
</head>
<body class="bg-slate-300">

    <div id="loader" class="fixed inset-0 bg-black/90 z-[9999] hidden flex-col items-center justify-center text-white">
        <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-amber-500 mb-4"></div>
        <p class="font-bold tracking-tighter uppercase text-sm">Processing High-Quality Report...</p>
    </div>

    <nav class="bg-slate-900 text-white p-3 sticky top-0 z-50 no-print flex justify-between items-center shadow-lg">
        <div class="flex items-center gap-2 pl-4">
            <i class="fas fa-file-invoice text-amber-500"></i>
            <h1 class="font-black text-sm tracking-widest uppercase">Ahmed_V26_Final</h1>
        </div>
        <div class="flex gap-3">
            <button onclick="switchTab('entry')" class="bg-blue-600 hover:bg-blue-500 px-5 py-2 rounded-lg text-[10px] font-black transition-all">ENTRY</button>
            <button onclick="switchTab('history')" class="bg-slate-700 hover:bg-slate-600 px-5 py-2 rounded-lg text-[10px] font-black transition-all">HISTORY</button>
        </div>
    </nav>

    <div id="entrySection" class="p-6">
        <div id="mainReportArea">
            <div class="report-paper shadow-2xl rounded-sm">
                <div class="text-center mb-6">
                    <h1 class="sc-title">DHANMONDI SC</h1>
                    <p class="text-[11px] font-bold tracking-[0.6em] uppercase text-slate-500 mt-1">Daily Activity Report</p>
                </div>

                <div class="flex justify-between items-start mb-6">
                    <div class="w-1/3 space-y-1">
                        <p class="text-[12px] font-bold uppercase">ASSIGNED BY: <input type="text" id="assignedBy" class="header-input w-48 border-b border-gray-100" value="MD AZMIR HOSSAIN"></p>
                        <div class="pt-2">
                            <p class="text-[12px] font-bold uppercase">NAME: <input type="text" id="userName" class="header-input w-52" value="SM FAISAL AHMED"></p>
                            <p class="text-[12px] font-bold text-blue-600 uppercase">HR ID: <input type="text" id="hrId" class="header-input w-32" value="0036"></p>
                            <p class="text-[12px] font-bold uppercase">DESIG: <input type="text" id="userDesig" class="header-input w-52" value="SENIOR SUPERVISOR"></p>
                        </div>
                    </div>

                    <div class="w-1/3 text-right">
                        <p class="text-[12px] font-bold mb-3">DATE: <input type="date" id="reportDate" class="border-b border-black px-1 font-bold text-sm bg-transparent outline-none"></p>
                        <div class="flex justify-end gap-5 text-[11px] font-bold no-print">
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="radio" name="shiftOpt" id="shiftDay" checked class="w-4 h-4 accent-black"> DAY
                            </label>
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="radio" name="shiftOpt" id="shiftNight" class="w-4 h-4 accent-black"> NIGHT
                            </label>
                        </div>
                    </div>
                </div>

                <table>
                    <thead class="bg-gray-50">
                        <tr class="h-10">
                            <th style="width: 35px;">SL</th>
                            <th style="width: 110px;">Client</th>
                            <th style="width: 100px;">Site Code</th>
                            <th style="width: 300px;">Work Details</th>
                            <th style="width: 80px;">Operation</th>
                            <th style="width: 100px;">Implementation</th>
                            <th style="width: 50px;">PM</th>
                            <th style="width: 60px;">Others</th>
                            <th>Team/assign</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>

                <div class="flex justify-between mt-20 px-12">
                    <div class="border-t-2 border-black w-48 text-center text-[11px] font-bold pt-2 uppercase">Submitted By</div>
                    <div class="border-t-2 border-black w-48 text-center text-[11px] font-bold pt-2 uppercase">Checked By</div>
                    <div class="border-t-2 border-black w-48 text-center text-[11px] font-bold pt-2 uppercase">Received By</div>
                </div>
            </div>
        </div>
        
        <button onclick="saveData()" class="fixed bottom-10 right-10 bg-amber-500 text-white w-16 h-16 rounded-full shadow-2xl no-print flex items-center justify-center hover:scale-110 active:scale-95 transition-all">
            <i class="fas fa-save text-2xl"></i>
        </button>
    </div>

    <div id="historySection" class="hidden p-6 max-w-4xl mx-auto no-print">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-slate-800 font-black text-xl uppercase">Saved History</h2>
            <button onclick="toggleSelectAll()" id="selBtn" class="bg-slate-200 text-slate-700 px-3 py-1 rounded text-[10px] font-bold uppercase">Select All</button>
        </div>
        <div id="historyList" class="space-y-3 mb-24"></div>
        
        <div class="fixed bottom-0 left-0 w-full bg-white/80 backdrop-blur-md p-6 flex justify-center gap-3 border-t border-slate-200">
            <button onclick="generateFinalPDF(true)" class="bg-blue-700 text-white px-5 py-3 rounded-full font-black text-[10px] uppercase shadow-lg">Telegram</button>
            <button onclick="generateFinalPDF(false)" class="bg-slate-800 text-white px-5 py-3 rounded-full font-black text-[10px] uppercase shadow-lg">Download PDF</button>
            <button onclick="directPrint()" class="bg-amber-500 text-white px-5 py-3 rounded-full font-black text-[10px] uppercase shadow-lg">
                <i class="fas fa-print mr-1"></i> Print
            </button>
        </div>
    </div>

    <div id="printContainer"></div>

    <script>
        const botToken = "8582534427:AAHq4TfwFqBIy1wU9mp6bDNQGSeSD49yX94";
        const chatId = "682844989";
        const DB_KEY = 'prof_stable_v26_final';

        function init() {
            const tb = document.getElementById('tableBody');
            tb.innerHTML = '';
            for(let i=1; i<=10; i++) {
                tb.innerHTML += `<tr>
                    <td class="font-bold bg-gray-50">${i}</td>
                    <td><input type="text" class="table-input client"></td>
                    <td><input type="text" class="table-input font-bold text-blue-600 site uppercase"></td>
                    <td><input type="text" class="table-input text-left work"></td>
                    <td><input type="checkbox" class="w-5 h-5 accent-black c1"></td>
                    <td><input type="checkbox" class="w-5 h-5 accent-black c2"></td>
                    <td><input type="checkbox" class="w-5 h-5 accent-black c3"></td>
                    <td><input type="checkbox" class="w-5 h-5 accent-black c4"></td>
                    <td><input type="text" class="table-input rem"></td>
                </tr>`;
            }
            document.getElementById('reportDate').value = new Date().toISOString().split('T')[0];
        }
        init();

        function switchTab(t) {
            document.getElementById('entrySection').classList.toggle('hidden', t !== 'entry');
            document.getElementById('historySection').classList.toggle('hidden', t !== 'history');
            if(t === 'history') renderHistory();
        }

        function saveData() {
            const rows = Array.from(document.querySelectorAll('#tableBody tr')).map(tr => ({
                c: tr.querySelector('.client').value, s: tr.querySelector('.site').value,
                w: tr.querySelector('.work').value, r: tr.querySelector('.rem').value,
                b1: tr.querySelector('.c1').checked, b2: tr.querySelector('.c2').checked,
                b3: tr.querySelector('.c3').checked, b4: tr.querySelector('.c4').checked
            }));
            const data = { 
                id: Date.now(), 
                date: document.getElementById('reportDate').value, 
                hr: document.getElementById('hrId').value, 
                assigned: document.getElementById('assignedBy').value,
                shift: document.getElementById('shiftDay').checked ? 'DAY' : 'NIGHT',
                rows 
            };
            let db = JSON.parse(localStorage.getItem(DB_KEY)) || [];
            db.push(data);
            localStorage.setItem(DB_KEY, JSON.stringify(db));
            alert("V26 Final: Report Saved.");
            switchTab('history');
        }

        function renderHistory() {
            const db = JSON.parse(localStorage.getItem(DB_KEY)) || [];
            const list = document.getElementById('historyList');
            if(db.length === 0) { list.innerHTML = `<p class="text-center text-slate-500 py-10">No records found.</p>`; return; }
            list.innerHTML = db.slice().reverse().map(h => `
                <div class="bg-white p-4 rounded-xl shadow-sm flex items-center justify-between border-l-4 border-amber-500">
                    <div class="flex items-center gap-4">
                        <input type="checkbox" class="db-chk h-6 w-6 accent-black cursor-pointer" value="${h.id}">
                        <div>
                            <p class="font-bold text-sm text-slate-800">${h.date}</p>
                            <p class="text-[10px] font-bold text-blue-600 uppercase">Shift: ${h.shift}</p>
                        </div>
                    </div>
                    <button class="text-red-400 hover:text-red-600 p-2" onclick="deleteItem(${h.id})"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');
        }

        function toggleSelectAll() {
            const chks = document.querySelectorAll('.db-chk');
            const btn = document.getElementById('selBtn');
            const allSel = Array.from(chks).every(c => c.checked);
            chks.forEach(c => c.checked = !allSel);
            btn.innerText = allSel ? "Select All" : "Unselect All";
        }

        function directPrint() {
            const selected = document.querySelectorAll('.db-chk:checked');
            if(selected.length === 0) return alert("Please select a record to print.");
            const db = JSON.parse(localStorage.getItem(DB_KEY)) || [];
            const printCont = document.getElementById('printContainer');
            printCont.innerHTML = '';
            
            selected.forEach((chk) => {
                const data = db.find(x => x.id == chk.value);
                const page = document.createElement('div');
                page.className = 'print-page-break';
                page.innerHTML = generatePrintHTML(data);
                printCont.appendChild(page);
            });

            setTimeout(() => {
                window.print();
            }, 500);
        }

        async function generateFinalPDF(isTelegram) {
            const selected = document.querySelectorAll('.db-chk:checked');
            if(selected.length === 0) return alert("Please select at least one record.");
            document.getElementById('loader').style.display = 'flex';
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('l', 'mm', 'a4');
            const db = JSON.parse(localStorage.getItem(DB_KEY)) || [];
            for(let i=0; i < selected.length; i++) {
                const data = db.find(x => x.id == selected[i].value);
                const tempDiv = document.createElement('div');
                tempDiv.style.width = '297mm';
                tempDiv.style.position = 'absolute'; tempDiv.style.left = '-9999px';
                tempDiv.innerHTML = generatePrintHTML(data);
                document.body.appendChild(tempDiv);
                const canvas = await html2canvas(tempDiv, { scale: 2, useCORS: true });
                const imgData = canvas.toDataURL('image/jpeg', 1.0);
                if(i > 0) pdf.addPage();
                pdf.addImage(imgData, 'JPEG', 0, 0, 297, 210);
                document.body.removeChild(tempDiv);
            }
            if(isTelegram) {
                const blob = pdf.output('blob');
                const fd = new FormData();
                fd.append('chat_id', chatId);
                fd.append('document', blob, `DAR_Professor_${Date.now()}.pdf`);
                await fetch(`https://api.telegram.org/bot${botToken}/sendDocument`, { method: 'POST', body: fd });
                alert("SENT TO TELEGRAM");
            } else { pdf.save(`DAR_Report_${Date.now()}.pdf`); }
            document.getElementById('loader').style.display = 'none';
        }

        function generatePrintHTML(data) {
            const getCircle = (checked) => `
                <div style="display:inline-flex; align-items:center; justify-content:center; width:16px; height:16px; border:1.5px solid black; border-radius:50%; margin:auto;">
                    ${checked ? '<div style="width:10px; height:10px; background:black; border-radius:50%;"></div>' : ''}
                </div>`;

            let rowsHtml = data.rows.map((r, i) => `
                <tr style="height:35px;">
                    <td style="border:1.5px solid black; font-weight:700;">${i+1}</td>
                    <td style="border:1.5px solid black;">${r.c}</td>
                    <td style="border:1.5px solid black; font-weight:700; color:#2563eb; text-transform:uppercase;">${r.s}</td>
                    <td style="border:1.5px solid black; text-align:left; padding-left:10px;">${r.w}</td>
                    <td style="border:1.5px solid black;">${getCircle(r.b1)}</td>
                    <td style="border:1.5px solid black;">${getCircle(r.b2)}</td>
                    <td style="border:1.5px solid black;">${getCircle(r.b3)}</td>
                    <td style="border:1.5px solid black;">${getCircle(r.b4)}</td>
                    <td style="border:1.5px solid black;">${r.r}</td>
                </tr>`).join('');

            return `
            <div style="width:297mm; min-height:210mm; padding:12mm; background:white; font-family: 'Inter', sans-serif; color:black; margin:auto;">
                <div style="text-align:center; margin-bottom:15px;">
                    <h1 style="margin:0; font-size:42px; font-weight:400; color:black; text-transform:uppercase; letter-spacing:2px;">DHANMONDI SC</h1>
                    <p style="margin:2px 0 0 0; font-size:11px; font-weight:700; letter-spacing:8px; text-transform:uppercase; color:#64748b;">Daily Activity Report</p>
                </div>
                
                <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:20px;">
                    <div style="font-size:13px; line-height:1.6;">
                        <b>ASSIGNED BY:</b> ${data.assigned}<br>
                        <b>NAME:</b> SM FAISAL AHMED<br>
                        <b style="color:#2563eb;">HR ID: ${data.hr}</b><br>
                        <b>DESIG:</b> SENIOR SUPERVISOR
                    </div>
                    <div style="text-align:right; font-size:13px;">
                        <b>DATE:</b> ${data.date}<br>
                        <div style="margin-top:8px;">
                            <b style="font-size:16px; text-transform:uppercase; font-weight:700;">SHIFT: ${data.shift}</b>
                        </div>
                    </div>
                </div>

                <table style="width:100%; border-collapse:collapse; text-align:center; font-size:11px; border:1.5px solid black;">
                    <thead>
                        <tr style="background:#f8fafc; height:42px;">
                            <th style="border:1.5px solid black; width:35px;">SL</th>
                            <th style="border:1.5px solid black; width:110px;">Client</th>
                            <th style="border:1.5px solid black; width:100px;">Site Code</th>
                            <th style="border:1.5px solid black; width:300px;">Work Details</th>
                            <th style="border:1.5px solid black; width:80px;">Operation</th>
                            <th style="border:1.5px solid black; width:100px;">Implementation</th>
                            <th style="border:1.5px solid black; width:50px;">PM</th>
                            <th style="border:1.5px solid black; width:60px;">Others</th>
                            <th style="border:1.5px solid black;">Remarks</th>
                        </tr>
                    </thead>
                    <tbody>${rowsHtml}</tbody>
                </table>

                <div style="display:flex; justify-content:space-between; margin-top:85px; padding: 0 60px;">
                    <div style="border-top:1.5px solid black; width:200px; text-align:center; font-size:12px; font-weight:700; padding-top:10px;">SUBMITTED BY</div>
                    <div style="border-top:1.5px solid black; width:200px; text-align:center; font-size:12px; font-weight:700; padding-top:10px;">CHECKED BY</div>
                    <div style="border-top:1.5px solid black; width:200px; text-align:center; font-size:12px; font-weight:700; padding-top:10px;">RECEIVED BY</div>
                </div>
            </div>`;
        }

        function deleteItem(id) { if(confirm("Permanently delete this report?")) { let db = JSON.parse(localStorage.getItem(DB_KEY)); db = db.filter(x => x.id != id); localStorage.setItem(DB_KEY, JSON.stringify(db)); renderHistory(); } }
    </script>
</body>
</html>
