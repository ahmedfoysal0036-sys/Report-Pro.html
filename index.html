<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHMED_V11 | Professor Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');
        body { font-family: 'Roboto', sans-serif; background: #f1f5f9; margin: 0; }
        
        @page { size: landscape; margin: 5mm; }
        
        @media print {
            .no-print { display: none !important; }
            body { background: white; }
            .report-paper { width: 100% !important; margin: 0 !important; padding: 4mm !important; box-shadow: none !important; border: none !important; }
            th, td { border: 1.5px solid black !important; font-size: 10px !important; }
        }

        .report-paper { 
            width: 290mm; 
            min-height: 180mm; 
            background: white; 
            margin: 15px auto; 
            padding: 8mm; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-radius: 4px;
        }

        table { width: 100%; border-collapse: collapse; table-layout: fixed; margin-top: 15px; }
        th, td { border: 1px solid black; padding: 5px; text-align: center; font-size: 11px; vertical-align: middle; }
        
        .input-field { width: 100%; border: none; outline: none; background: transparent; text-align: center; font-family: inherit; font-size: 11px; }
        .header-input { border-bottom: 1px solid black; outline: none; font-weight: bold; width: 190px; }
        .editable-head { font-weight: bold; text-align: center; background: transparent; border: none; font-size: 9px; width: 100%; text-transform: uppercase; cursor: text; }
        
        .sig-box { border-top: 1.5px solid black; width: 170px; text-align: center; font-size: 10px; font-weight: bold; margin-top: 45px; }
    </style>
</head>
<body>

    <nav class="bg-slate-900 text-white p-3 sticky top-0 z-50 no-print flex justify-between items-center shadow-md">
        <div class="flex items-center gap-3">
            <i class="fas fa-user-tie text-blue-400 text-lg"></i>
            <h1 class="font-bold text-xs tracking-widest uppercase">Ahmed_V11 | GitHub Live Edition</h1>
        </div>
        <div class="flex gap-2">
            <button onclick="switchTab('entry')" class="bg-blue-600 hover:bg-blue-700 px-4 py-1.5 rounded text-[10px] font-bold transition-all">ENTRY</button>
            <button onclick="switchTab('history')" class="bg-slate-700 hover:bg-slate-600 px-4 py-1.5 rounded text-[10px] font-bold transition-all">HISTORY</button>
        </div>
    </nav>

    <div id="entrySection">
        <div class="report-paper" id="mainReportArea">
            <div class="flex justify-between items-start">
                <div class="w-1/3 space-y-3">
                    <p class="text-[11px] font-bold">ASSIGNED BY: <input type="text" id="assignedBy" class="header-input" value="MD AZMIR HOSSAIN"></p>
                    <p class="text-[11px] font-bold">NAME: <input type="text" id="userName" class="header-input" style="width: 230px;" value="SM FAISAL AHMED"></p>
                    <p class="text-[11px] font-bold">DESIGNATION: <input type="text" id="userDesig" class="header-input" value="SENIOR SUPERVISOR"></p>
                </div>
                
                <div class="text-center">
                    <h1 class="font-bold text-3xl uppercase text-slate-900 leading-none">Dhanmondi SC</h1>
                    <p class="text-[10px] font-bold uppercase tracking-[0.4em] text-blue-500 mt-2">Daily Activity Report</p>
                </div>
                
                <div class="w-1/3 text-right space-y-3">
                    <p class="text-[11px] font-bold">DATE: <input type="date" id="reportDate" class="border rounded px-2 py-1 text-[11px] font-bold bg-slate-50"></p>
                    <div class="flex justify-end gap-4 text-[11px] font-bold">
                        <label class="cursor-pointer"><input type="checkbox" id="shiftDay" checked> DAY</label>
                        <label class="cursor-pointer"><input type="checkbox" id="shiftNight"> NIGHT</label>
                    </div>
                </div>
            </div>

            <table id="mainTable">
                <thead class="bg-slate-100">
                    <tr>
                        <th class="w-[4%]">SL</th>
                        <th class="w-[10%]">Client</th>
                        <th class="w-[12%]">Site Code</th>
                        <th class="w-[34%]">Work Details</th>
                        <th class="w-[7%]"><input type="text" class="editable-head" value="Operation"></th>
                        <th class="w-[7%]"><input type="text" class="editable-head" value="Implementation"></th>
                        <th class="w-[7%]"><input type="text" class="editable-head" value="PM"></th>
                        <th class="w-[7%]"><input type="text" class="editable-head" value="Others"></th>
                        <th class="w-[12%]">Remarks</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>

            <div class="flex justify-between mt-12 px-12">
                <div class="sig-box">SUBMITTED BY</div>
                <div class="sig-box">CHECKED BY</div>
                <div class="sig-box">RECEIVED BY</div>
            </div>
        </div>

        <div class="max-w-4xl mx-auto flex flex-wrap gap-4 justify-center py-10 no-print px-4">
            <button onclick="sendToTelegramExcel()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-8 py-3 rounded-xl font-bold text-xs shadow-xl flex items-center gap-2 transform active:scale-95 transition-all">
                <i class="fab fa-telegram-plane text-lg"></i> PUSH TO TELEGRAM
            </button>
            <button onclick="downloadPerfectExcel()" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl font-bold text-xs shadow-xl flex items-center gap-2 transform active:scale-95 transition-all">
                <i class="fas fa-file-excel text-lg"></i> DOWNLOAD EXCEL
            </button>
            <button onclick="window.print()" class="bg-slate-800 hover:bg-slate-900 text-white px-8 py-3 rounded-xl font-bold text-xs shadow-xl flex items-center gap-2">
                <i class="fas fa-print text-lg"></i> PRINT REPORT
            </button>
        </div>
    </div>

    <div id="historySection" class="hidden p-8 max-w-4xl mx-auto no-print">
        <div class="bg-white p-6 rounded-2xl shadow-xl border">
            <h2 class="font-bold text-lg text-slate-800 mb-6 flex items-center gap-2">
                <i class="fas fa-database text-blue-500"></i> Local Storage History
            </h2>
            <div id="historyList" class="space-y-3"></div>
        </div>
    </div>

    <script>
        const botToken = "8582534427:AAHq4TfwFqBIy1wU9mp6bDNQGSeSD49yX94";
        const chatId = "682844989";
        
        // Auto-date initialization
        document.getElementById('reportDate').value = new Date().toISOString().split('T')[0];

        // Generate 10 Slim Rows
        function initRows() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            for(let i=1; i<=10; i++) {
                tbody.innerHTML += `
                    <tr>
                        <td class="h-10 font-bold text-slate-700">${i}</td>
                        <td><input type="text" class="input-field client"></td>
                        <td><input type="text" class="input-field site font-bold text-blue-800 uppercase"></td>
                        <td><input type="text" class="input-field text-left px-2 work-desc"></td>
                        <td><input type="checkbox" class="cb scale-150"></td>
                        <td><input type="checkbox" class="cb scale-150"></td>
                        <td><input type="checkbox" class="cb scale-150"></td>
                        <td><input type="checkbox" class="cb scale-150"></td>
                        <td><input type="text" class="input-field remarks px-2"></td>
                    </tr>
                `;
            }
        }
        initRows();

        function switchTab(tab) {
            document.getElementById('entrySection').classList.toggle('hidden', tab !== 'entry');
            document.getElementById('historySection').classList.toggle('hidden', tab !== 'history');
            if(tab === 'history') renderHistory();
        }

        // --- THE MAGIC FIX: Pre-processing Table for Excel ---
        function getReadyClone() {
            const original = document.getElementById('mainReportArea');
            const clone = original.cloneNode(true);
            
            // Sync Text Inputs
            const originalInputs = original.querySelectorAll('input[type="text"]');
            clone.querySelectorAll('input[type="text"]').forEach((input, i) => {
                const span = document.createElement('span');
                span.innerText = originalInputs[i].value;
                input.parentNode.replaceChild(span, input);
            });
            
            // Sync Checkboxes to Ticks
            const originalChecks = original.querySelectorAll('input[type="checkbox"]');
            clone.querySelectorAll('input[type="checkbox"]').forEach((cb, i) => {
                const span = document.createElement('span');
                span.innerText = originalChecks[i].checked ? "✔" : "";
                cb.parentNode.replaceChild(span, cb);
            });

            // Date Input Fix
            const dateVal = document.getElementById('reportDate').value;
            const dateInp = clone.querySelector('#reportDate');
            if(dateInp) dateInp.parentNode.innerText = "DATE: " + dateVal;

            return clone;
        }

        function downloadPerfectExcel() {
            const tableClone = getReadyClone();
            const wb = XLSX.utils.table_to_book(tableClone);
            XLSX.writeFile(wb, `Ahmed_Report_${document.getElementById('reportDate').value}.xlsx`);
        }

        async function sendToTelegramExcel() {
            const tableClone = getReadyClone();
            const wb = XLSX.utils.table_to_book(tableClone);
            const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
            const blob = new Blob([wbout], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });

            const formData = new FormData();
            formData.append('chat_id', chatId);
            formData.append('document', blob, `Report_${document.getElementById('reportDate').value}.xlsx`);
            formData.append('caption', `📊 Daily Report Received\n📅 Date: ${document.getElementById('reportDate').value}\n👤 User: Faisal Ahmed`);

            try {
                const res = await fetch(`https://api.telegram.org/bot${botToken}/sendDocument`, { method: 'POST', body: formData });
                if(res.ok) alert("✅ Success! Excel file sent to Telegram.");
                else alert("❌ GitHub/Telegram Security Blocked the Push. Try in Safari.");
            } catch (e) { alert("Network Error. Check internet."); }
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = `<p class="text-slate-400 text-sm italic">Local storage auto-saves on Telegram Push.</p>`;
        }
    </script>
</body>
</html>
